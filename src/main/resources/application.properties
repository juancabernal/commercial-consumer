spring.config.import=optional:file:.env[.properties]}

server.port=${SERVER_PORT:8081}

spring.application.name=commercial-service

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/
rabbitmq.dynamic=false
# Evitar bucles infinitos en errores
spring.rabbitmq.listener.simple.default-requeue-rejected=false

rabbitmq.exchange.commercial=${RABBITMQ_EXCHANGE_COMMERCIAL:commercial.exchange}
rabbitmq.queue.table=${RABBITMQ_QUEUE_TABLE:table.queue}
rabbitmq.routing-key.table=${RABBITMQ_ROUTING_KEY_TABLE:table.events}

sales.patch.request.exchange=${RABBITMQ_EXCHANGE_SALES_PATCH_REQUEST:sales.patch.request.exchange}
sales.patch.request.queue=${RABBITMQ_QUEUE_SALES_PATCH_REQUEST:sales.patch.request.queue}
sales.patch.request.routingKey=${RABBITMQ_ROUTING_KEY_SALES_PATCH_REQUEST:sales.patch.request}

rabbitmq.queue.purchase=${RABBITMQ_QUEUE_PURCHASE}
