spring.application.name=commercial-service

server.port=${SERVER_PORT:8081}

# =========================
# DATABASE
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eatupapi}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# RABBITMQ
# =========================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

rabbitmq.exchange.commercial=${RABBITMQ_EXCHANGE_COMMERCIAL:commercial.exchange}
rabbitmq.queue.table=${RABBITMQ_QUEUE_TABLE:table.queue}
rabbitmq.routing-key.table=${RABBITMQ_ROUTING_KEY_TABLE:table.events}

rabbitmq.dynamic=false
# Evitar bucles infinitos en errores
spring.rabbitmq.listener.simple.default-requeue-rejected=false